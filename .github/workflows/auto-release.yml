name: Auto-release on version bump
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions: write-all
concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false
env:
  VERSION_FILE: src/env.ts
jobs:
  auto-release:
    name: Create universal-format tag + GitHub Release if APP_VERSION was bumped
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: version
        run: |
          set -euo pipefail
          RAW=$(grep -E "APP_VERSION[[:space:]]*=[[:space:]]*['\"]APP v[0-9]+\.[0-9]+\.[0-9]+['\"]" "$VERSION_FILE" | head -1 || true)
          if [ -z "$RAW" ]; then
            echo "::error::Could not find APP_VERSION in $VERSION_FILE"
            exit 1
          fi
          DIGITS=$(echo "$RAW" | sed -E "s/.*APP v([0-9]+\.[0-9]+\.[0-9]+).*/\1/")
          TAG=$(echo "$DIGITS" | awk -F. '{ printf "v%02d.%02d.%02d", $1, $2, $3 }')
          echo "raw_version=$DIGITS" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Audit existing tag and release state
        id: check
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag_exists=false
          tag_sha=''
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            tag_exists=true
            tag_sha="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/commits/${TAG}" \
                --jq '.sha'
            )"
          fi

          releases="$(
            gh api --method GET --paginate \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=100" |
              jq -sc 'if length == 0 then [] else add end'
          )"
          selected_releases="$(jq -c --arg tag "$TAG" '[.[] | select(.tag_name == $tag)]' <<<"$releases")"
          release_count="$(jq 'length' <<<"$selected_releases")"
          if [ "$release_count" -gt 1 ]; then
            echo "::error::Multiple releases resolve to ${TAG}." >&2
            exit 1
          fi

          release_state=missing
          complete=false
          if [ "$release_count" -eq 1 ]; then
            release_state="$(jq -r 'if .[0].draft then "draft" else "published" end' <<<"$selected_releases")"
            prerelease="$(jq -r '.[0].prerelease' <<<"$selected_releases")"
            asset_count="$(jq '.[0].assets | length' <<<"$selected_releases")"
            release_target="$(jq -r '.[0].target_commitish' <<<"$selected_releases")"
            if [ "$prerelease" != false ]; then
              echo "::error::Release ${TAG} is classified as a prerelease; expected a normal release." >&2
              exit 1
            fi
            if [ "$asset_count" -ne 0 ]; then
              echo "::error::Release ${TAG} has ${asset_count} unexpected uploaded asset(s)." >&2
              exit 1
            fi
            if [ "$release_state" = published ]; then
              if [ "$tag_exists" != true ]; then
                echo "::error::Published release ${TAG} has no matching remote tag." >&2
                exit 1
              fi
              if [ "$release_target" != "$tag_sha" ]; then
                echo "::error::Published release ${TAG} targets ${release_target}, but its tag resolves to ${tag_sha}." >&2
                exit 1
              fi
              complete=true
            elif [ "$release_target" != "$GITHUB_SHA" ]; then
              echo "::error::Draft release ${TAG} targets ${release_target}, not ${GITHUB_SHA}." >&2
              exit 1
            fi
          fi
          if [ "$complete" != true ] && [ "$tag_exists" = true ] && [ "$tag_sha" != "$GITHUB_SHA" ]; then
            echo "::error::Tag ${TAG} resolves to ${tag_sha}, not the reconciliation target ${GITHUB_SHA}." >&2
            exit 1
          fi

          {
            echo "release_tag=$TAG"
            echo "tag_exists=$tag_exists"
            echo "release_state=$release_state"
            echo "complete=$complete"
          } >> "$GITHUB_OUTPUT"
          echo "Release state for ${TAG}: tag_exists=${tag_exists}, state=${release_state}, complete=${complete}."
      - name: Wait for successful push workflows on this commit
        if: steps.check.outputs.complete != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRED_PUSH_WORKFLOWS: deploy.yml format-public.yml codeql.yml socket.yml ci.yml zizmor.yml
        run: |
          set -euo pipefail
          readonly poll_seconds=10
          readonly stable_polls_required=3
          deadline=$((SECONDS + 2700))
          read -r -a required_workflows <<<"$REQUIRED_PUSH_WORKFLOWS"

          remote_main_sha() {
            gh api --method GET \
              "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" \
              --jq '.object.sha'
          }

          assert_main_is_target() {
            local phase="$1"
            local main_sha
            main_sha="$(remote_main_sha)"
            if [ "$main_sha" != "$GITHUB_SHA" ]; then
              echo "::error::Remote main moved during $phase: expected $GITHUB_SHA, found $main_sha." >&2
              exit 1
            fi
            echo "Remote main is still $GITHUB_SHA ($phase)."
          }

          latest_push_runs() {
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --commit "$GITHUB_SHA" \
              --event push \
              --limit 1000 \
              --json attempt,conclusion,createdAt,databaseId,event,headSha,name,status,workflowDatabaseId,workflowName |
              jq -c --arg sha "$GITHUB_SHA" --arg current "$GITHUB_RUN_ID" '
                def workflow_label:
                  ([.workflowName, .name] | map(select(. != null and . != "")) | first) // "";
                def workflow_key:
                  if (.workflowDatabaseId // 0) != 0 then "id:\(.workflowDatabaseId)"
                  elif (workflow_label | length) > 0 then "name:\(workflow_label)"
                  else "run:\(.databaseId)"
                  end;
                map(select(
                  .headSha == $sha and
                  .event == "push" and
                  ((.databaseId | tostring) != $current)
                ))
                | group_by(workflow_key)
                | map(max_by([.createdAt, .databaseId]))
                | sort_by(workflow_key)
              '
          }

          declare -A required_labels=()
          required_ids=()
          for workflow in "${required_workflows[@]}"; do
            workflow_id="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}" \
                --jq '.id'
            )"
            required_ids+=("$workflow_id")
            required_labels["$workflow_id"]="$workflow"
          done

          assert_main_is_target "before the workflow wait"

          while true; do
            latest_runs="$(latest_push_runs)"
            all_required_succeeded=true

            for workflow_id in "${required_ids[@]}"; do
              workflow="${required_labels[$workflow_id]}"
              run_json="$(
                jq -c --argjson workflow_id "$workflow_id" \
                  '.[] | select(.workflowDatabaseId == $workflow_id)' \
                  <<<"$latest_runs"
              )"
              if [ -z "$run_json" ]; then
                echo "$workflow has not started for $GITHUB_SHA yet."
                all_required_succeeded=false
                continue
              fi

              status="$(jq -r '.status' <<<"$run_json")"
              conclusion="$(jq -r '.conclusion // ""' <<<"$run_json")"
              run_id="$(jq -r '.databaseId' <<<"$run_json")"
              echo "$workflow run $run_id: status=$status conclusion=${conclusion:-pending}"

              if [ "$status" = "completed" ] && [ "$conclusion" != "success" ]; then
                echo "::error::$workflow run $run_id concluded $conclusion for $GITHUB_SHA." >&2
                exit 1
              fi
              if [ "$status" != "completed" ]; then
                all_required_succeeded=false
              fi
            done

            if [ "$all_required_succeeded" = true ]; then
              break
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::Timed out waiting for required push workflows on $GITHUB_SHA." >&2
              exit 1
            fi
            sleep "$poll_seconds"
          done

          stable_signature=""
          stable_polls=0
          while true; do
            latest_runs="$(latest_push_runs)"
            failed_runs="$(
              jq -c '[.[] | select(.status == "completed" and (.conclusion // "") != "success")]' \
                <<<"$latest_runs"
            )"
            if [ "$(jq 'length' <<<"$failed_runs")" -gt 0 ]; then
              jq -r '
                def label:
                  ([.workflowName, .name] | map(select(. != null and . != "")) | first) //
                  ("workflow " + ((.workflowDatabaseId // 0) | tostring));
                .[] | "::error::\(label) run \(.databaseId) concluded \(.conclusion // "without a conclusion")."
              ' <<<"$failed_runs" >&2
              exit 1
            fi

            pending_runs="$(jq -c '[.[] | select(.status != "completed")]' <<<"$latest_runs")"
            pending_count="$(jq 'length' <<<"$pending_runs")"
            if [ "$pending_count" -eq 0 ]; then
              signature="$(
                jq -r '
                  map([
                    (.workflowDatabaseId | tostring),
                    (.databaseId | tostring),
                    (.attempt | tostring),
                    .status,
                    (.conclusion // "")
                  ] | join(":")) | sort | join("|")
                ' <<<"$latest_runs"
              )"
              if [ "$signature" = "$stable_signature" ]; then
                stable_polls=$((stable_polls + 1))
              else
                stable_signature="$signature"
                stable_polls=1
              fi
              echo "All observed push workflows succeeded (stable poll $stable_polls/$stable_polls_required)."
              if [ "$stable_polls" -ge "$stable_polls_required" ]; then
                break
              fi
            else
              stable_signature=""
              stable_polls=0
              jq -r '
                def label:
                  ([.workflowName, .name] | map(select(. != null and . != "")) | first) //
                  ("workflow " + ((.workflowDatabaseId // 0) | tostring));
                .[] | "Waiting for \(label) run \(.databaseId): \(.status)"
              ' <<<"$pending_runs"
            fi

            if [ "$SECONDS" -ge "$deadline" ]; then
              if [ "$pending_count" -gt 0 ]; then
                echo "::error::Timed out with pending push workflows on $GITHUB_SHA." >&2
                exit 1
              fi
              echo "All observed push workflows succeeded at the timeout boundary."
              break
            fi
            sleep "$poll_seconds"
          done

          assert_main_is_target "after the workflow wait"
      - name: Reconcile exact tag + GitHub Release
        if: steps.check.outputs.complete != 'true'
        env:
          RELEASE_TAG: ${{ steps.check.outputs.release_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag_exists() {
            git ls-remote --exit-code --tags origin "refs/tags/${1}" >/dev/null 2>&1
          }

          assert_main_is_target() {
            local phase="$1"
            local main_sha
            main_sha="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" \
                --jq '.object.sha'
            )"
            if [ "$main_sha" != "$GITHUB_SHA" ]; then
              echo "::error::Remote main moved during ${phase}: expected $GITHUB_SHA, found $main_sha." >&2
              exit 1
            fi
          }

          assert_tag_is_target() {
            local tag_sha
            if ! tag_exists "$RELEASE_TAG"; then
              echo "::error::Required tag ${RELEASE_TAG} does not exist." >&2
              exit 1
            fi
            tag_sha="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}" \
                --jq '.sha'
            )"
            if [ "$tag_sha" != "$GITHUB_SHA" ]; then
              echo "::error::Tag ${RELEASE_TAG} resolves to ${tag_sha}, not ${GITHUB_SHA}." >&2
              exit 1
            fi
          }

          release_snapshot() {
            gh api --method GET --paginate \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=100" |
              jq -sc 'if length == 0 then [] else add end'
          }

          release_state() {
            local matches="$1"
            local count prerelease asset_count target_commitish
            count="$(jq 'length' <<<"$matches")"
            if [ "$count" -gt 1 ]; then
              echo "::error::Multiple releases resolve to ${RELEASE_TAG}." >&2
              return 1
            fi
            if [ "$count" -eq 0 ]; then
              echo missing
              return
            fi
            prerelease="$(jq -r '.[0].prerelease' <<<"$matches")"
            asset_count="$(jq '.[0].assets | length' <<<"$matches")"
            target_commitish="$(jq -r '.[0].target_commitish' <<<"$matches")"
            if [ "$prerelease" != false ]; then
              echo "::error::Release ${RELEASE_TAG} is classified as a prerelease; expected a normal release." >&2
              return 1
            fi
            if [ "$asset_count" -ne 0 ]; then
              echo "::error::Release ${RELEASE_TAG} has ${asset_count} unexpected uploaded asset(s)." >&2
              return 1
            fi
            if [ "$target_commitish" != "$GITHUB_SHA" ]; then
              echo "::error::Release ${RELEASE_TAG} targets ${target_commitish}, not ${GITHUB_SHA}." >&2
              return 1
            fi
            jq -r 'if .[0].draft then "draft" else "published" end' <<<"$matches"
          }

          assert_main_is_target "pre-release reconciliation"
          releases="$(release_snapshot)"
          selected_releases="$(jq -c --arg tag "$RELEASE_TAG" '[.[] | select(.tag_name == $tag)]' <<<"$releases")"
          state="$(release_state "$selected_releases")"

          if tag_exists "$RELEASE_TAG"; then
            assert_tag_is_target
          else
            if [ "$state" = published ]; then
              echo "::error::Published release ${RELEASE_TAG} has no matching remote tag." >&2
              exit 1
            fi
            assert_main_is_target "exact tag creation"
            if ! gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${RELEASE_TAG}" \
              -f sha="$GITHUB_SHA" >/dev/null; then
              echo "Tag creation returned an error; checking for a concurrent exact creation."
            fi
            assert_tag_is_target
            echo "Created exact tag ${RELEASE_TAG} at ${GITHUB_SHA}."
          fi

          releases="$(release_snapshot)"
          selected_releases="$(jq -c --arg tag "$RELEASE_TAG" '[.[] | select(.tag_name == $tag)]' <<<"$releases")"
          state="$(release_state "$selected_releases")"
          assert_main_is_target "the final release mutation"
          assert_tag_is_target

          # Deliberately omit --latest: gh documents automatic selection based
          # on date and version, so a retry of an older release cannot force a
          # regression of the repository's current Latest release.
          case "$state" in
            missing)
              gh release create "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --verify-tag \
                --target "$GITHUB_SHA" \
                --title "$RELEASE_TAG" \
                --notes "Release $RELEASE_TAG. See CHANGELOG.md for details."
              echo "Created release ${RELEASE_TAG} from the verified tag."
              ;;
            draft)
              gh release edit "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --verify-tag \
                --target "$GITHUB_SHA" \
                --title "$RELEASE_TAG" \
                --notes "Release $RELEASE_TAG. See CHANGELOG.md for details." \
                --draft=false
              echo "Published reconciled draft release ${RELEASE_TAG}."
              ;;
            published)
              echo "Release ${RELEASE_TAG} was published concurrently; validating it."
              ;;
          esac

          assert_tag_is_target
          releases="$(release_snapshot)"
          selected_releases="$(jq -c --arg tag "$RELEASE_TAG" '[.[] | select(.tag_name == $tag)]' <<<"$releases")"
          final_state="$(release_state "$selected_releases")"
          if [ "$final_state" != published ]; then
            echo "::error::Release ${RELEASE_TAG} did not converge to a published normal release." >&2
            exit 1
          fi
          echo "Verified published release ${RELEASE_TAG} at ${GITHUB_SHA} with no uploaded assets."
    timeout-minutes: 60
