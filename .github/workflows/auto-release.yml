name: Auto-release on version bump
on:
  push:
    branches: [main]
  schedule:
    - cron: "41 * * * *"
  workflow_dispatch:
permissions: write-all
concurrency:
  group: auto-release-${{ github.ref }}
  queue: max
  cancel-in-progress: false
env:
  VERSION_FILE: src/env.ts
jobs:
  auto-release:
    name: Create universal-format tag + GitHub Release if APP_VERSION was bumped
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: version
        run: |
          set -euo pipefail
          RAW=$(grep -E "APP_VERSION[[:space:]]*=[[:space:]]*['\"]APP v[0-9]+\.[0-9]+\.[0-9]+['\"]" "$VERSION_FILE" | head -1 || true)
          if [ -z "$RAW" ]; then
            echo "::error::Could not find APP_VERSION in $VERSION_FILE"
            exit 1
          fi
          DIGITS=$(echo "$RAW" | sed -E "s/.*APP v([0-9]+\.[0-9]+\.[0-9]+).*/\1/")
          TAG=$(echo "$DIGITS" | awk -F. '{ printf "v%02d.%02d.%02d", $1, $2, $3 }')
          echo "raw_version=$DIGITS" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Audit existing tag and release state
        id: check
        env:
          TAG: ${{ steps.version.outputs.tag }}
          RAW_VERSION: ${{ steps.version.outputs.raw_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          resolve_commitish() {
            local commitish="$1"
            local encoded_commitish resolved_sha
            encoded_commitish="$(jq -rn --arg value "$commitish" '$value | @uri')"
            if ! resolved_sha="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/commits/${encoded_commitish}" \
                --jq '.sha'
            )"; then
              echo "::error::Could not resolve release target_commitish ${commitish}." >&2
              return 1
            fi
            if [[ ! "$resolved_sha" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::Resolved release target is not a full commit SHA: ${resolved_sha}." >&2
              return 1
            fi
            printf '%s\n' "$resolved_sha"
          }

          assert_target_version() {
            local target_sha="$1"
            local source raw target_version
            if ! source="$(git show "${target_sha}:${VERSION_FILE}" 2>/dev/null)"; then
              echo "::error::${VERSION_FILE} is missing at reconciliation target ${target_sha}." >&2
              return 1
            fi
            raw="$(grep -E "APP_VERSION[[:space:]]*=[[:space:]]*['\"]APP v[0-9]+\.[0-9]+\.[0-9]+['\"]" <<<"$source" | head -1 || true)"
            if [ -z "$raw" ]; then
              echo "::error::Could not read APP_VERSION at reconciliation target ${target_sha}." >&2
              return 1
            fi
            target_version="$(sed -E "s/.*APP v([0-9]+\.[0-9]+\.[0-9]+).*/\1/" <<<"$raw")"
            if [ "$target_version" != "$RAW_VERSION" ]; then
              echo "::error::Reconciliation target ${target_sha} contains APP_VERSION ${target_version}, expected ${RAW_VERSION}." >&2
              return 1
            fi
          }

          assert_target_is_on_main() {
            local target_sha="$1"
            local main_sha comparison status merge_base
            main_sha="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" \
                --jq '.object.sha'
            )"
            comparison="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/compare/${target_sha}...${main_sha}"
            )"
            status="$(jq -r '.status' <<<"$comparison")"
            merge_base="$(jq -r '.merge_base_commit.sha' <<<"$comparison")"
            if [ "$merge_base" != "$target_sha" ] || { [ "$status" != ahead ] && [ "$status" != identical ]; }; then
              echo "::error::Reconciliation target ${target_sha} is not on current main history ${main_sha} (status=${status}, merge-base=${merge_base})." >&2
              return 1
            fi
          }

          tag_exists=false
          tag_sha=''
          encoded_tag="$(jq -rn --arg value "$TAG" '$value | @uri')"
          if gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${encoded_tag}" \
            >/dev/null 2>&1; then
            tag_exists=true
            tag_sha="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/commits/${TAG}" \
                --jq '.sha'
            )"
          fi

          releases="$(
            gh api --method GET --paginate \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=100" |
              jq -sc 'if length == 0 then [] else add end'
          )"
          selected_releases="$(jq -c --arg tag "$TAG" '[.[] | select(.tag_name == $tag)]' <<<"$releases")"
          release_count="$(jq 'length' <<<"$selected_releases")"
          if [ "$release_count" -gt 1 ]; then
            echo "::error::Multiple releases resolve to ${TAG}." >&2
            exit 1
          fi

          release_state=missing
          complete=false
          target_sha="$GITHUB_SHA"
          if [ "$release_count" -eq 1 ]; then
            release_state="$(jq -r 'if .[0].draft then "draft" else "published" end' <<<"$selected_releases")"
            prerelease="$(jq -r '.[0].prerelease' <<<"$selected_releases")"
            asset_count="$(jq '.[0].assets | length' <<<"$selected_releases")"
            release_target="$(jq -r '.[0].target_commitish' <<<"$selected_releases")"
            if [ "$prerelease" != false ]; then
              echo "::error::Release ${TAG} is classified as a prerelease; expected a normal release." >&2
              exit 1
            fi
            if [ "$asset_count" -ne 0 ]; then
              echo "::error::Release ${TAG} has ${asset_count} unexpected uploaded asset(s)." >&2
              exit 1
            fi
            if [ "$release_state" = published ]; then
              if [ "$tag_exists" != true ]; then
                echo "::error::Published release ${TAG} has no matching remote tag." >&2
                exit 1
              fi
              # For a published release, a symbolic target is historical metadata
              # that may move. The exact existing tag is authoritative.
              if [[ "$release_target" =~ ^[0-9a-f]{40}$ ]] && [ "$release_target" != "$tag_sha" ]; then
                echo "::error::Published release ${TAG} targets ${release_target}, but its tag resolves to ${tag_sha}." >&2
                exit 1
              fi
              target_sha="$tag_sha"
              complete=true
            elif [ "$tag_exists" = true ]; then
              target_sha="$tag_sha"
              if [[ "$release_target" =~ ^[0-9a-f]{40}$ ]] && [ "$release_target" != "$target_sha" ]; then
                echo "::error::Draft release ${TAG} targets ${release_target}, but its existing tag resolves to ${target_sha}." >&2
                exit 1
              fi
            else
              target_sha="$(resolve_commitish "$release_target")"
            fi
          elif [ "$tag_exists" = true ]; then
            target_sha="$tag_sha"
          fi

          assert_target_version "$target_sha"
          assert_target_is_on_main "$target_sha"

          {
            echo "release_tag=$TAG"
            echo "tag_exists=$tag_exists"
            echo "release_state=$release_state"
            echo "target_sha=$target_sha"
            echo "complete=$complete"
          } >> "$GITHUB_OUTPUT"
          echo "Release state for ${TAG}: tag_exists=${tag_exists}, state=${release_state}, target=${target_sha}, complete=${complete}."
      - name: Wait for successful push workflows on this commit
        if: steps.check.outputs.complete != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRED_PUSH_WORKFLOWS: deploy.yml format-public.yml codeql.yml socket.yml ci.yml zizmor.yml
          # Never auto-rerun deploy.yml for an old SHA: that could roll production back.
          SAFE_CANCELLED_RERUN_WORKFLOWS: format-public.yml codeql.yml socket.yml ci.yml zizmor.yml
          TARGET_SHA: ${{ steps.check.outputs.target_sha }}
        run: |
          set -euo pipefail
          readonly poll_seconds=10
          readonly stable_polls_required=3
          deadline=$((SECONDS + 2700))
          read -r -a required_workflows <<<"$REQUIRED_PUSH_WORKFLOWS"
          read -r -a safe_cancelled_rerun_workflows <<<"$SAFE_CANCELLED_RERUN_WORKFLOWS"
          readonly max_cancelled_attempts=3
          declare -A safe_cancelled_rerun_names=()
          declare -A rerun_requests=()
          for workflow in "${safe_cancelled_rerun_workflows[@]}"; do
            safe_cancelled_rerun_names["$workflow"]=true
          done

          assert_target_is_on_main() {
            local phase="$1"
            local main_sha comparison status merge_base
            main_sha="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" \
                --jq '.object.sha'
            )"
            comparison="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/compare/${TARGET_SHA}...${main_sha}"
            )"
            status="$(jq -r '.status' <<<"$comparison")"
            merge_base="$(jq -r '.merge_base_commit.sha' <<<"$comparison")"
            if [ "$merge_base" != "$TARGET_SHA" ] || { [ "$status" != ahead ] && [ "$status" != identical ]; }; then
              echo "::error::Target ${TARGET_SHA} left main history during ${phase} (main=${main_sha}, status=${status}, merge-base=${merge_base})." >&2
              exit 1
            fi
            echo "Target ${TARGET_SHA} remains on main history ${main_sha} (${phase})."
          }

          self_workflow_id="$(
            gh api --method GET \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              --jq '.workflow_id'
          )"

          latest_push_runs() {
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --commit "$TARGET_SHA" \
              --event push \
              --limit 1000 \
              --json attempt,conclusion,createdAt,databaseId,event,headSha,name,status,workflowDatabaseId,workflowName |
              jq -c --arg sha "$TARGET_SHA" --argjson self_workflow_id "$self_workflow_id" '
                def workflow_label:
                  ([.workflowName, .name] | map(select(. != null and . != "")) | first) // "";
                def workflow_key:
                  if (.workflowDatabaseId // 0) != 0 then "id:\(.workflowDatabaseId)"
                  elif (workflow_label | length) > 0 then "name:\(workflow_label)"
                  else "run:\(.databaseId)"
                  end;
                map(select(
                  .headSha == $sha and
                  .event == "push" and
                  (.workflowDatabaseId // 0) != $self_workflow_id
                ))
                | group_by(workflow_key)
                | map(max_by([.createdAt, .databaseId]))
                | sort_by(workflow_key)
              '
          }

          declare -A required_labels=()
          required_ids=()
          for workflow in "${required_workflows[@]}"; do
            workflow_id="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}" \
                --jq '.id'
            )"
            required_ids+=("$workflow_id")
            required_labels["$workflow_id"]="$workflow"
          done

          assert_target_is_on_main "before the workflow wait"

          while true; do
            latest_runs="$(latest_push_runs)"
            all_required_succeeded=true

            for workflow_id in "${required_ids[@]}"; do
              workflow="${required_labels[$workflow_id]}"
              run_json="$(
                jq -c --argjson workflow_id "$workflow_id" \
                  '.[] | select(.workflowDatabaseId == $workflow_id)' \
                  <<<"$latest_runs"
              )"
              if [ -z "$run_json" ]; then
                echo "$workflow has not started for $TARGET_SHA yet."
                all_required_succeeded=false
                continue
              fi

              status="$(jq -r '.status' <<<"$run_json")"
              conclusion="$(jq -r '.conclusion // ""' <<<"$run_json")"
              run_id="$(jq -r '.databaseId' <<<"$run_json")"
              echo "$workflow run $run_id: status=$status conclusion=${conclusion:-pending}"

              if [ "$status" = "completed" ] && [ "$conclusion" != "success" ]; then
                if [ "$conclusion" = "cancelled" ] && [ -n "${safe_cancelled_rerun_names[$workflow]:-}" ]; then
                  run_attempt="$(jq -r '.attempt' <<<"$run_json")"
                  if [ "$run_attempt" -ge "$max_cancelled_attempts" ]; then
                    echo "::error::$workflow run $run_id was cancelled at attempt $run_attempt; automatic retries are capped at $max_cancelled_attempts." >&2
                    exit 1
                  fi
                  rerun_key="${run_id}:${run_attempt}"
                  if [ -z "${rerun_requests[$rerun_key]:-}" ]; then
                    gh api --method POST \
                      -H "Accept: application/vnd.github+json" \
                      -H "X-GitHub-Api-Version: 2026-03-10" \
                      "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/rerun" \
                      >/dev/null
                    rerun_requests["$rerun_key"]=true
                    echo "::notice::Re-running cancelled side-effect-free gate $workflow run $run_id attempt $run_attempt at $TARGET_SHA."
                  fi
                  all_required_succeeded=false
                  continue
                fi
                echo "::error::$workflow run $run_id concluded $conclusion for $TARGET_SHA." >&2
                exit 1
              fi
              if [ "$status" != "completed" ]; then
                all_required_succeeded=false
              fi
            done

            if [ "$all_required_succeeded" = true ]; then
              break
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::Timed out waiting for required push workflows on $TARGET_SHA." >&2
              exit 1
            fi
            sleep "$poll_seconds"
          done

          stable_signature=""
          stable_polls=0
          while true; do
            latest_runs="$(latest_push_runs)"
            failed_runs="$(
              jq -c '[.[] | select(.status == "completed" and (.conclusion // "") != "success")]' \
                <<<"$latest_runs"
            )"
            if [ "$(jq 'length' <<<"$failed_runs")" -gt 0 ]; then
              jq -r '
                def run_label:
                  ([.workflowName, .name] | map(select(. != null and . != "")) | first) //
                  ("workflow " + ((.workflowDatabaseId // 0) | tostring));
                .[] | "::error::\(run_label) run \(.databaseId) concluded \(.conclusion // "without a conclusion")."
              ' <<<"$failed_runs" >&2
              exit 1
            fi

            pending_runs="$(jq -c '[.[] | select(.status != "completed")]' <<<"$latest_runs")"
            pending_count="$(jq 'length' <<<"$pending_runs")"
            if [ "$pending_count" -eq 0 ]; then
              signature="$(
                jq -r '
                  map([
                    (.workflowDatabaseId | tostring),
                    (.databaseId | tostring),
                    (.attempt | tostring),
                    .status,
                    (.conclusion // "")
                  ] | join(":")) | sort | join("|")
                ' <<<"$latest_runs"
              )"
              if [ "$signature" = "$stable_signature" ]; then
                stable_polls=$((stable_polls + 1))
              else
                stable_signature="$signature"
                stable_polls=1
              fi
              echo "All observed push workflows succeeded (stable poll $stable_polls/$stable_polls_required)."
              if [ "$stable_polls" -ge "$stable_polls_required" ]; then
                break
              fi
            else
              stable_signature=""
              stable_polls=0
              jq -r '
                def run_label:
                  ([.workflowName, .name] | map(select(. != null and . != "")) | first) //
                  ("workflow " + ((.workflowDatabaseId // 0) | tostring));
                .[] | "Waiting for \(run_label) run \(.databaseId): \(.status)"
              ' <<<"$pending_runs"
            fi

            if [ "$SECONDS" -ge "$deadline" ]; then
              if [ "$pending_count" -gt 0 ]; then
                echo "::error::Timed out with pending push workflows on $TARGET_SHA." >&2
                exit 1
              fi
              echo "All observed push workflows succeeded at the timeout boundary."
              break
            fi
            sleep "$poll_seconds"
          done

          assert_target_is_on_main "after the workflow wait"
      - name: Verify exact CodeQL analyses for the release target
        if: steps.check.outputs.complete != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ steps.check.outputs.target_sha }}
        run: |
          set -euo pipefail
          readonly poll_seconds=10
          deadline=$((SECONDS + 300))

          while true; do
            analyses="$(
              gh api --method GET --paginate \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2026-03-10" \
                "repos/${GITHUB_REPOSITORY}/code-scanning/analyses?tool_name=CodeQL&ref=refs/heads/main&per_page=100" |
                jq -sc --arg sha "$TARGET_SHA" '
                  [
                    .[] |
                    if type == "array" then .[] else . end |
                    select(
                      .commit_sha == $sha and
                      .ref == "refs/heads/main" and
                      .tool.name == "CodeQL"
                    )
                  ]
                  | sort_by([.analysis_key // "", .category // "", .created_at // "", .id // 0])
                  | group_by([.analysis_key // "", .category // ""])
                  | map(max_by([.created_at // "", .id // 0]))
                '
            )"

            if [ "$(jq 'length' <<<"$analyses")" -eq 0 ]; then
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "::error::No CodeQL analysis was published for exact release target ${TARGET_SHA}." >&2
                exit 1
              fi
              echo "Waiting for CodeQL analysis metadata for exact target ${TARGET_SHA}."
              sleep "$poll_seconds"
              continue
            fi

            jq -r '
              .[] |
              "CodeQL analysis \(.id): key=\(.analysis_key // "") category=\(.category // "") error=\(.error // "") warning=\(.warning // "") rules=\(.rules_count // "missing") results=\(.results_count // "missing")"
            ' <<<"$analyses"
            invalid_analyses="$(
              jq -c '[
                .[] |
                select(
                  (.error // "") != "" or
                  (.warning // "") != "" or
                  (.rules_count | type) != "number" or
                  .rules_count <= 0 or
                  (.results_count | type) != "number" or
                  .results_count != 0
                )
              ]' <<<"$analyses"
            )"
            if [ "$(jq 'length' <<<"$invalid_analyses")" -ne 0 ]; then
              echo "::error::Exact-target CodeQL evidence is incomplete, errored, warned, empty, or contains results for ${TARGET_SHA}." >&2
              jq -c '.[]' <<<"$invalid_analyses" >&2
              exit 1
            fi

            echo "Verified zero-result CodeQL analyses for exact release target ${TARGET_SHA}."
            break
          done
      - name: Reconcile exact tag + GitHub Release
        if: steps.check.outputs.complete != 'true'
        env:
          RELEASE_TAG: ${{ steps.check.outputs.release_tag }}
          TARGET_SHA: ${{ steps.check.outputs.target_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag_exists() {
            local encoded_tag
            encoded_tag="$(jq -rn --arg value "$1" '$value | @uri')"
            gh api --method GET \
              "repos/${GITHUB_REPOSITORY}/git/ref/tags/${encoded_tag}" \
              >/dev/null 2>&1
          }

          assert_target_is_on_main() {
            local phase="$1"
            local main_sha comparison status merge_base
            main_sha="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" \
                --jq '.object.sha'
            )"
            comparison="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/compare/${TARGET_SHA}...${main_sha}"
            )"
            status="$(jq -r '.status' <<<"$comparison")"
            merge_base="$(jq -r '.merge_base_commit.sha' <<<"$comparison")"
            if [ "$merge_base" != "$TARGET_SHA" ] || { [ "$status" != ahead ] && [ "$status" != identical ]; }; then
              echo "::error::Target ${TARGET_SHA} left main history during ${phase} (main=${main_sha}, status=${status}, merge-base=${merge_base})." >&2
              exit 1
            fi
          }

          assert_tag_is_target() {
            local tag_sha
            if ! tag_exists "$RELEASE_TAG"; then
              echo "::error::Required tag ${RELEASE_TAG} does not exist." >&2
              exit 1
            fi
            tag_sha="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}" \
                --jq '.sha'
            )"
            if [ "$tag_sha" != "$TARGET_SHA" ]; then
              echo "::error::Tag ${RELEASE_TAG} resolves to ${tag_sha}, not ${TARGET_SHA}." >&2
              exit 1
            fi
          }

          release_snapshot() {
            gh api --method GET --paginate \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=100" |
              jq -sc 'if length == 0 then [] else add end'
          }

          resolve_commitish() {
            local commitish="$1"
            local encoded_commitish resolved_sha
            encoded_commitish="$(jq -rn --arg value "$commitish" '$value | @uri')"
            if ! resolved_sha="$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/commits/${encoded_commitish}" \
                --jq '.sha'
            )"; then
              echo "::error::Could not resolve release target_commitish ${commitish}." >&2
              return 1
            fi
            if [[ ! "$resolved_sha" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::Resolved release target is not a full commit SHA: ${resolved_sha}." >&2
              return 1
            fi
            printf '%s\n' "$resolved_sha"
          }

          release_state() {
            local matches="$1"
            local count prerelease asset_count target_commitish target_sha state
            count="$(jq 'length' <<<"$matches")"
            if [ "$count" -gt 1 ]; then
              echo "::error::Multiple releases resolve to ${RELEASE_TAG}." >&2
              return 1
            fi
            if [ "$count" -eq 0 ]; then
              echo missing
              return
            fi
            prerelease="$(jq -r '.[0].prerelease' <<<"$matches")"
            asset_count="$(jq '.[0].assets | length' <<<"$matches")"
            target_commitish="$(jq -r '.[0].target_commitish' <<<"$matches")"
            if [ "$prerelease" != false ]; then
              echo "::error::Release ${RELEASE_TAG} is classified as a prerelease; expected a normal release." >&2
              return 1
            fi
            if [ "$asset_count" -ne 0 ]; then
              echo "::error::Release ${RELEASE_TAG} has ${asset_count} unexpected uploaded asset(s)." >&2
              return 1
            fi
            state="$(jq -r 'if .[0].draft then "draft" else "published" end' <<<"$matches")"
            if [[ "$target_commitish" =~ ^[0-9a-f]{40}$ ]] && [ "$target_commitish" != "$TARGET_SHA" ]; then
              echo "::error::Release ${RELEASE_TAG} targets ${target_commitish}, not ${TARGET_SHA}." >&2
              return 1
            fi
            if [ "$state" = draft ] && ! tag_exists "$RELEASE_TAG"; then
              target_sha="$(resolve_commitish "$target_commitish")" || return 1
              if [ "$target_sha" != "$TARGET_SHA" ]; then
                echo "::error::Draft release ${RELEASE_TAG} target ${target_commitish} resolves to ${target_sha}, not ${TARGET_SHA}." >&2
                return 1
              fi
            fi
            printf '%s\n' "$state"
          }

          assert_target_is_on_main "pre-release reconciliation"
          releases="$(release_snapshot)"
          selected_releases="$(jq -c --arg tag "$RELEASE_TAG" '[.[] | select(.tag_name == $tag)]' <<<"$releases")"
          state="$(release_state "$selected_releases")"

          if tag_exists "$RELEASE_TAG"; then
            assert_tag_is_target
          else
            if [ "$state" = published ]; then
              echo "::error::Published release ${RELEASE_TAG} has no matching remote tag." >&2
              exit 1
            fi
            assert_target_is_on_main "exact tag creation"
            if ! gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${RELEASE_TAG}" \
              -f sha="$TARGET_SHA" >/dev/null; then
              echo "Tag creation returned an error; checking for a concurrent exact creation."
            fi
            assert_tag_is_target
            echo "Created exact tag ${RELEASE_TAG} at ${TARGET_SHA}."
          fi

          releases="$(release_snapshot)"
          selected_releases="$(jq -c --arg tag "$RELEASE_TAG" '[.[] | select(.tag_name == $tag)]' <<<"$releases")"
          state="$(release_state "$selected_releases")"
          assert_target_is_on_main "the final release mutation"
          assert_tag_is_target

          # Deliberately omit --latest: gh documents automatic selection based
          # on date and version, so a retry of an older release cannot force a
          # regression of the repository's current Latest release.
          case "$state" in
            missing)
              gh release create "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --verify-tag \
                --target "$TARGET_SHA" \
                --title "$RELEASE_TAG" \
                --notes "Release $RELEASE_TAG. See CHANGELOG.md for details."
              echo "Created release ${RELEASE_TAG} from the verified tag."
              ;;
            draft)
              gh release edit "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --verify-tag \
                --target "$TARGET_SHA" \
                --title "$RELEASE_TAG" \
                --notes "Release $RELEASE_TAG. See CHANGELOG.md for details." \
                --draft=false
              echo "Published reconciled draft release ${RELEASE_TAG}."
              ;;
            published)
              echo "Release ${RELEASE_TAG} was published concurrently; validating it."
              ;;
          esac

          assert_tag_is_target
          releases="$(release_snapshot)"
          selected_releases="$(jq -c --arg tag "$RELEASE_TAG" '[.[] | select(.tag_name == $tag)]' <<<"$releases")"
          final_state="$(release_state "$selected_releases")"
          if [ "$final_state" != published ]; then
            echo "::error::Release ${RELEASE_TAG} did not converge to a published normal release." >&2
            exit 1
          fi
          assert_target_is_on_main "after release publication"
          echo "Verified published release ${RELEASE_TAG} at ${TARGET_SHA} with no uploaded assets."
    timeout-minutes: 60
